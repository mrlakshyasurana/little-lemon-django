<!DOCTYPE html>
<html>
<head>
    <title>Little Lemon Table Booking</title>
</head>
<body>
    <h1>Book a Table at Little Lemon</h1>
    
    <!-- The form sends data back to the server securely -->
    <form method="POST" action="">
        {% csrf_token %} <!-- Django security token required for forms -->
        
        <label for="first_name">Your Name:</label><br>
        <input type="text" id="first_name" name="first_name" required><br><br>

        <label for="reservation_date">Reservation Date:</label><br>
        <input type="date" id="reservation_date" name="reservation_date" required><br><br>

        <label for="seats">Number of Seats:</label><br>
        <input type="number" id="seats" name="seats" min="1" max="10" required><br><br>

        <button type="submit">Submit Reservation</button>
    </form>
</body>
</html>
